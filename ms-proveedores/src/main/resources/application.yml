spring:
  application:
    name: MS-PROVEEDORES
  datasource:
    url: jdbc:mysql://localhost:3306/prueba5?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8087

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  enable-hateoas: false
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.example.ms_proveedores: INFO
