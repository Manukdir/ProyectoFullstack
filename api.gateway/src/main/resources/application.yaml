server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Ruta para el Microservicio de Productos
        - id: productos-route
          uri: lb://MS-PRODUCTOS
          predicates:
            - Path=/api/v1/productos/**

        # Ruta para el Microservicio de Inventario
        - id: inventario-route
          uri: lb://MS-INVENTARIO
          predicates:
            - Path=/api/v1/inventarios/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG