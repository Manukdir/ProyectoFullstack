databaseChangeLog:
  - changeSet:
      id: 1-create-envios
      author: equipo
      changes:
        - createTable:
            tableName: envios
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: pedido_id
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: usuario_id
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: codigo_envio
                  type: varchar(150)
                  constraints:
                    nullable: false
              - column:
                  name: direccion_entrega
                  type: varchar(150)
                  constraints:
                    nullable: false
              - column:
                  name: costo_envio
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: entregado
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: fecha_envio
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: estado_envio
                  type: varchar(150)
                  constraints:
                    nullable: false

  - changeSet:
      id: 2-create-seguimientos
      author: equipo
      changes:
        - createTable:
            tableName: seguimientos
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: envio_id
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: ubicacion_actual
                  type: varchar(150)
                  constraints:
                    nullable: false
              - column:
                  name: estado
                  type: varchar(150)
                  constraints:
                    nullable: false
              - column:
                  name: orden_evento
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: visible_cliente
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: fecha_evento
                  type: datetime
                  constraints:
                    nullable: false
              - column:
                  name: comentario
                  type: varchar(150)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: seguimientos
            baseColumnNames: envio_id
            referencedTableName: envios
            referencedColumnNames: id
            constraintName: fk_seguimientos_envio_id
