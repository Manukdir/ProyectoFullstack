databaseChangeLog:
  - changeSet:
      id: initial-create-envios
      author: equipo
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: envios
      changes:
        - createTable:
            tableName: envios
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: pedido_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: usuario_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: codigo_seguimiento
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: direccion_destino
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: transportista
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: costo_envio
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: entregado
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: fecha_envio
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: fecha_estimada_entrega
                  type: DATE
                  constraints:
                    nullable: false
        - insert:
            tableName: envios
            columns:
              - column:
                  name: pedido_id
                  valueNumeric: 1
              - column:
                  name: usuario_id
                  valueNumeric: 1
              - column:
                  name: codigo_seguimiento
                  value: CODIGOSEGUIMIENTO-001
              - column:
                  name: direccion_destino
                  value: direccionDestino 1
              - column:
                  name: transportista
                  value: transportista 1
              - column:
                  name: costo_envio
                  valueNumeric: 1000.00
              - column:
                  name: entregado
                  valueBoolean: true
              - column:
                  name: fecha_envio
                  valueDate: 2026-01-10
              - column:
                  name: fecha_estimada_entrega
                  valueDate: 2027-01-10
        - insert:
            tableName: envios
            columns:
              - column:
                  name: pedido_id
                  valueNumeric: 2
              - column:
                  name: usuario_id
                  valueNumeric: 2
              - column:
                  name: codigo_seguimiento
                  value: CODIGOSEGUIMIENTO-002
              - column:
                  name: direccion_destino
                  value: direccionDestino 2
              - column:
                  name: transportista
                  value: transportista 2
              - column:
                  name: costo_envio
                  valueNumeric: 2000.00
              - column:
                  name: entregado
                  valueBoolean: false
              - column:
                  name: fecha_envio
                  valueDate: 2026-02-10
              - column:
                  name: fecha_estimada_entrega
                  valueDate: 2027-02-10
        - insert:
            tableName: envios
            columns:
              - column:
                  name: pedido_id
                  valueNumeric: 3
              - column:
                  name: usuario_id
                  valueNumeric: 3
              - column:
                  name: codigo_seguimiento
                  value: CODIGOSEGUIMIENTO-003
              - column:
                  name: direccion_destino
                  value: direccionDestino 3
              - column:
                  name: transportista
                  value: transportista 3
              - column:
                  name: costo_envio
                  valueNumeric: 3000.00
              - column:
                  name: entregado
                  valueBoolean: true
              - column:
                  name: fecha_envio
                  valueDate: 2026-03-10
              - column:
                  name: fecha_estimada_entrega
                  valueDate: 2027-03-10
  - changeSet:
      id: initial-create-seguimientos
      author: equipo
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: seguimientos
      changes:
        - createTable:
            tableName: seguimientos
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: envio_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: estado
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: descripcion
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: ubicacion
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: orden
                  type: INT
                  constraints:
                    nullable: false
