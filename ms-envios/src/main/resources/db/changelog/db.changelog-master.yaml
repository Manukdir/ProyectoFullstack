            expectedResult: 0
            sql: SELECT COUNT(*) FROM seguimientos s JOIN envios e ON s.envio_id = e.id WHERE e.codigo_seguimiento = 'CODIGOSEGUIMIENTO-004' AND s.orden = 40
      changes:
        - sql: INSERT INTO seguimientos (envio_id, estado, descripcion, ubicacion, orden, visible_cliente, fecha_evento) SELECT id, 'EN_TRANSITO', 'descripcion 4', 'ubicacion 4', 40, true, '2026-04-10 10:00:00' FROM envios WHERE codigo_seguimiento = 'CODIGOSEGUIMIENTO-004'
