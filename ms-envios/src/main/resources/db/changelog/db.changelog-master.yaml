              - column:
                  name: visible_cliente
                  valueBoolean: true
              - column:
                  name: fecha_evento
                  valueDate: 2026-01-10 10:00:00
        - insert:
            tableName: seguimientos
            columns:
              - column:
                  name: envio_id
                  valueNumeric: 2
              - column:
                  name: estado
                  value: CREADO
              - column:
                  name: descripcion
                  value: descripcion 2
              - column:
                  name: ubicacion
                  value: ubicacion 2
              - column:
                  name: orden
                  valueNumeric: 20
              - column:
                  name: visible_cliente
                  valueBoolean: false
              - column:
                  name: fecha_evento
                  valueDate: 2026-02-10 10:00:00
        - insert:
            tableName: seguimientos
