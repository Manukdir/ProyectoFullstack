databaseChangeLog:
  - changeSet:
      id: 1-create-envios
      author: codex
      changes:
        - createTable:
            tableName: envios
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
