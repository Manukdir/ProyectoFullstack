spring:
  application:
    name: ms-pedidos
  datasource:
    url: jdbc:mysql://localhost:3306/prueba3?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

servicios:
  usuarios:
    url: http://localhost:8081
  productos:
    url: http://localhost:8082

springdoc:
  enable-hateoas: false
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.example.ms_pedidos: INFO
