spring:
  # Nombre con el que este servicio se registra en Eureka.
  application:
    name: MS-PEDIDOS
  # Conexión local a MySQL administrado por Laragon.
  datasource:
    url: jdbc:mysql://localhost:3306/prueba3?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  # Cada microservicio utiliza un puerto distinto.
  port: 8084

eureka:
  # Eureka permite que otros servicios encuentren a MS-PEDIDOS por su nombre.
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

servicios:
  # Estos servicios todavía se consumen mediante su URL local.
  usuarios:
    url: http://localhost:8081
  productos:
    url: http://localhost:8082

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.example.ms_pedidos: INFO
