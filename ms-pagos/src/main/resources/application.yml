spring:
  application:
    name: MS-PAGOS
  profiles:
    default: dev

server:
  port: 8085

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.example.ms_pagos: INFO
