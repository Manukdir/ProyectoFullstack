spring:
  # Nombre con el que este servicio se registra en Eureka.
  # IMPORTANTE: en mayusculas y sin puntos, el Gateway lo busca por este nombre exacto.
  application:
    name: MS-PRODUCTOS

  # Conexion a MySQL (local, vía Laragon/XAMPP).
  datasource:
    url: jdbc:mysql://localhost:3306/prueba1?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  # Puerto fijo de ms-productos dentro del rango 8081-8090 del proyecto.
  port: 8082

eureka:
  client:
    # Se registra en Eureka y descarga el listado de servicios disponibles.
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# URL del microservicio de inventario, usada por el FeignClient.
# Cuando todo pase por Eureka esto deja de ser necesario (Feign resolveria
# por nombre lb://MS-INVENTARIO), pero mientras se prueba en local es más
# claro dejarlo explícito aquí.
servicios:
  inventario:
    url: http://localhost:8083

# Swagger / OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.example.ms_productos: INFO
